server {
  listen 80;
  server_name _;
  # Needed so proxy_pass with a variable resolves host.docker.internal per request (avoids stale/wrong upstream).
  resolver 127.0.0.11 valid=10s ipv6=off;

  root /usr/share/nginx/html;
  index index.html;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;

  gzip on;
  gzip_vary on;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_types text/plain text/css application/javascript application/json;

  location / {
    try_files $uri /index.html;
  }

  location ~* \.(js|css|svg|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location /api/ {
    # Backend listens on host :5000; variable + resolver avoids nginx upstream issues to the gateway.
    set $api_upstream host.docker.internal;
    proxy_pass http://$api_upstream:5000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    proxy_buffering off;
    proxy_request_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}

# Backend uses PostgreSQL on the VPS host (not localhost inside the container).
# Set DATABASE_URL in backend/.env to use host.docker.internal (see backend/.env.example).

services:
  backend:
    build:
      context: ./backend
    container_name: file-sharing-backend
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
    container_name: file-sharing-frontend
    ports:
      # Host :80 → app at http://YOUR_IP/ (no port in URL). Stop any other service using host port 80 first.
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  uploads_data:

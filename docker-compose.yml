# Backend uses PostgreSQL on the VPS host (not localhost inside the container).
# Set DATABASE_URL in backend/.env to use host.docker.internal (see backend/.env.example).

services:
  backend:
    build:
      context: ./backend
    container_name: file-sharing-backend
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
    container_name: file-sharing-frontend
    ports:
      # Not 6000 — Chrome blocks it (ERR_UNSAFE_PORT). Use 8080 or 8443, etc.
      - "8080:80"
    depends_on:
      - backend

volumes:
  uploads_data:

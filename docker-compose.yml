# All services on the default Compose network: nginx → backend:5000, backend → db:5432.
# Copy .env.example to .env (next to this file) and set FLSS_POSTGRES_PASSWORD to match
# the password in backend/.env DATABASE_URL.

services:
  db:
    image: postgres:16-alpine
    container_name: file-sharing-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: flss_user
      POSTGRES_PASSWORD: ${FLSS_POSTGRES_PASSWORD:?Create .env with FLSS_POSTGRES_PASSWORD — see .env.example}
      POSTGRES_DB: filesharing
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flss_user -d filesharing"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
    container_name: file-sharing-backend
    env_file:
      - ./backend/.env
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  frontend:
    build:
      context: ./frontend
    container_name: file-sharing-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  uploads_data:
  pgdata:

services:
  db:
    image: postgres:16-alpine
    container_name: file-sharing-db
    environment:
      POSTGRES_DB: filesharing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d filesharing"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: file-sharing-backend
    environment:
      PORT: 5000
      DATABASE_URL: postgres://postgres:postgres@db:5432/filesharing
      CORS_ORIGIN: "*"
      MAX_FILE_SIZE_BYTES: 104857600
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: file-sharing-frontend
    ports:
      - "6000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
